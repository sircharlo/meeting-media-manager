name: Build

on:
  workflow_call:
    inputs:
      checkout-latest:
        description: 'Checkout the latest changes from the repository'
        type: boolean
      publish-release:
        description: 'Publish build artifacts to GitHub Releases via electron-builder'
        type: boolean
        default: false
    secrets:
      APPLE_APP_SPECIFIC_PASSWORD:
        required: true
      APPLE_ID:
        required: true
      APPLE_TEAM_ID:
        required: true
      KEYCHAIN_PASSWORD:
        required: true
      MAC_CERTIFICATE_BASE64:
        required: true
      MAC_CERTIFICATE_PASSWORD:
        required: true
      SENTRY_AUTH_TOKEN:
        required: true
      SONAR_TOKEN:
        required: true
      TEST_VERSION:
        required: true

jobs:
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  quality:
    name: Lint and test
    runs-on: ubuntu-latest
    steps:
      - name: Check out master branch
        if: ${{ inputs.checkout-latest == true }}
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: master
      - name: Check out Git repository
        if: ${{ inputs.checkout-latest == false }}
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - name: Setup Node
        if: ${{ !inputs.publish-release }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          cache: 'yarn'
      - name: Setup Node without cache for release publishing
        if: ${{ inputs.publish-release }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
      - name: Install X11 development libraries (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxtst-dev libxinerama-dev libx11-xcb-dev libxkbcommon-x11-dev libxss-dev libpng-dev libpng++-dev
      - name: Install dependencies
        run: yarn install
      - name: Prepare Quasar
        run: yarn quasar prepare
      - name: Lint files
        run: yarn lint
      - name: Run tests
        run: yarn test:unit

  robotjs-native:
    name: Build robotjs native (${{ matrix.artifact }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact: robotjs-darwin-arm64
            arch: arm64
            install-node-architecture: arm64
            node-architecture: arm64
            node-version: 24
            os: macos-latest
          - artifact: robotjs-darwin-x64
            arch: x64
            install-node-architecture: x64
            node-architecture: x64
            node-version: 24
            os: macos-15-intel
          - artifact: robotjs-win32-ia32
            arch: ia32
            install-node-architecture: x64
            node-architecture: x86
            node-version: 24
            os: windows-latest
          - artifact: robotjs-win32-x64
            arch: x64
            install-node-architecture: x64
            node-architecture: x64
            node-version: 24
            os: windows-latest
    steps:
      - name: Check out master branch
        if: ${{ inputs.checkout-latest == true }}
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: master
      - name: Check out Git repository
        if: ${{ inputs.checkout-latest == false }}
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - name: Setup Node
        if: ${{ !inputs.publish-release }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          architecture: ${{ matrix.install-node-architecture }}
          cache: 'yarn'
          node-version: ${{ matrix.node-version }}
      - name: Setup Node without cache for release publishing
        if: ${{ inputs.publish-release }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          architecture: ${{ matrix.install-node-architecture }}
          node-version: ${{ matrix.node-version }}
      - name: Install dependencies
        run: yarn install
      - name: Setup target Node architecture
        if: ${{ matrix.install-node-architecture != matrix.node-architecture }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          architecture: ${{ matrix.node-architecture }}
          node-version: ${{ matrix.node-version }}
      - name: Rebuild robotjs for Electron
        run: yarn exec electron-rebuild -f -m ./node_modules/robotjs --arch=${{ matrix.arch }}
        env:
          npm_config_arch: ${{ matrix.arch }}
          npm_config_target_arch: ${{ matrix.arch }}
      - name: Upload robotjs native artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          if-no-files-found: error
          name: ${{ matrix.artifact }}
          path: node_modules/robotjs/build/Release/robotjs.node

  build:
    runs-on: ${{ matrix.os }}
    needs: [quality, robotjs-native]
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Check out master branch
        if: ${{ inputs.checkout-latest == true }}
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: master
      - name: Check out Git repository
        if: ${{ inputs.checkout-latest == false }}
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - name: Setup Node
        if: ${{ !inputs.publish-release }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          cache: 'yarn'
      - name: Setup Node without cache for release publishing
        if: ${{ inputs.publish-release }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
      - name: Install X11 development libraries (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxtst-dev libxinerama-dev libx11-xcb-dev libxkbcommon-x11-dev libxss-dev libpng-dev libpng++-dev
      - name: Install dependencies
        run: yarn install
      - name: Download robotjs native artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: ${{ runner.temp }}/robotjs-native
          pattern: robotjs-*
      - name: Prepare robotjs native artifacts (macOS only)
        if: runner.os == 'macOS'
        run: |
          artifact_root="$RUNNER_TEMP/robotjs-native"
          prepared="$artifact_root/prepared"
          mkdir -p "$prepared"
          lipo -create \
            "$artifact_root/robotjs-darwin-x64/robotjs.node" \
            "$artifact_root/robotjs-darwin-arm64/robotjs.node" \
            -output "$prepared/robotjs-darwin-universal.node"
      - name: Prepare robotjs native artifacts (Windows only)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $artifactRoot = Join-Path $env:RUNNER_TEMP 'robotjs-native'
          $prepared = Join-Path $artifactRoot 'prepared'
          New-Item -ItemType Directory -Force $prepared | Out-Null
          Copy-Item (Join-Path $artifactRoot 'robotjs-win32-x64\robotjs.node') (Join-Path $prepared 'robotjs-win32-x64.node')
          Copy-Item (Join-Path $artifactRoot 'robotjs-win32-ia32\robotjs.node') (Join-Path $prepared 'robotjs-win32-ia32.node')
      - name: Prepare robotjs native artifacts (Linux only)
        if: runner.os == 'Linux'
        run: mkdir -p "$RUNNER_TEMP/robotjs-native/prepared"
      - name: Install Apple certificate
        if: runner.os == 'macOS' && github.actor != 'dependabot[bot]'
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          MAC_CERTIFICATE_BASE64: ${{ secrets.MAC_CERTIFICATE_BASE64 }}
          MAC_CERTIFICATE_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
        run: |
          echo "create variables"
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo "import certificate"
          echo -n "$MAC_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH

          echo "create temporary keychain"
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          echo "import certificate to keychain"
          security import $CERTIFICATE_PATH -P "$MAC_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
      - name: Run security find-identity -v
        if: runner.os == 'macOS' && github.actor != 'dependabot[bot]'
        run: security find-identity -v
      - name: Build Electron App
        id: build
        run: |
          yarn generate:icons
          yarn generate:logos
          yarn build -- --publish=${{ inputs.publish-release && 'always' || 'never' }}
        continue-on-error: ${{ runner.os == 'macOS' }}
        env:
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GITHUB_TOKEN: ${{ github.token }}
          ROBOTJS_NATIVE_ARTIFACTS_DIR: ${{ runner.temp }}/robotjs-native/prepared
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          TEST_VERSION: ${{ secrets.TEST_VERSION }}

      - name: Retry build without notarization (macOS agreement expired)
        if: runner.os == 'macOS' && steps.build.outcome == 'failure'
        run: |
          echo "::warning::macOS notarization failed — likely an expired agreement. Producing unsigned build."
          yarn build -- --publish=${{ inputs.publish-release && 'always' || 'never' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          ROBOTJS_NATIVE_ARTIFACTS_DIR: ${{ runner.temp }}/robotjs-native/prepared
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          TEST_VERSION: ${{ secrets.TEST_VERSION }}
      - name: Clean up keychain and provisioning profile
        if: always() && runner.os == 'macOS' && github.actor != 'dependabot[bot]'
        run: |
          rm -f $RUNNER_TEMP/build_certificate.p12
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db
      - name: Upload artifacts
        if: ${{ !inputs.publish-release }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: M³ test build for ${{ matrix.os == 'macos-latest' && 'macOS' || matrix.os == 'windows-latest' && 'Windows' || 'Linux' }}
          path: |
            dist/electron/Packaged/*.exe
            dist/electron/Packaged/*.dmg
            dist/electron/Packaged/*.zip
            dist/electron/Packaged/*.AppImage
            dist/electron/Packaged/*/*/Contents/Info.plist
