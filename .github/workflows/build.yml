name: Build

on:
  workflow_call:
    inputs:
      checkout-latest:
        description: 'Checkout the latest changes from the repository'
        type: boolean
      publish-release:
        description: 'Publish build artifacts to GitHub Releases via electron-builder'
        type: boolean
        default: false
    secrets:
      APPLE_APP_SPECIFIC_PASSWORD:
        required: true
      APPLE_ID:
        required: true
      APPLE_TEAM_ID:
        required: true
      KEYCHAIN_PASSWORD:
        required: true
      MAC_CERTIFICATE_BASE64:
        required: true
      MAC_CERTIFICATE_PASSWORD:
        required: true
      SENTRY_AUTH_TOKEN:
        required: true
      SONAR_TOKEN:
        required: true
      TEST_VERSION:
        required: true

jobs:
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  quality:
    name: Lint and test
    runs-on: ubuntu-latest
    steps:
      - name: Check out master branch
        if: ${{ inputs.checkout-latest == true }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: master
      - name: Check out Git repository
        if: ${{ inputs.checkout-latest == false }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Setup Node
        if: ${{ !inputs.publish-release }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          cache: 'yarn'
      - name: Setup Node without cache for release publishing
        if: ${{ inputs.publish-release }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
      - name: Install X11 development libraries (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxtst-dev libxinerama-dev libx11-xcb-dev libxkbcommon-x11-dev libxss-dev libpng-dev libpng++-dev
      - name: Install dependencies
        run: yarn install
      - name: Prepare Quasar
        run: yarn quasar prepare
      - name: Lint files
        run: yarn lint
      - name: Run tests
        run: yarn test:unit

  build:
    runs-on: ${{ matrix.os }}
    needs: [quality]
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Check out master branch
        if: ${{ inputs.checkout-latest == true }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: master
      - name: Check out Git repository
        if: ${{ inputs.checkout-latest == false }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Setup Node
        if: ${{ !inputs.publish-release }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          cache: 'yarn'
      - name: Setup Node without cache for release publishing
        if: ${{ inputs.publish-release }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
      - name: Install X11 development libraries (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxtst-dev libxinerama-dev libx11-xcb-dev libxkbcommon-x11-dev libxss-dev libpng-dev libpng++-dev
      - name: Install dependencies
        run: yarn install
      - name: Install Apple certificate
        if: runner.os == 'macOS' && github.actor != 'dependabot[bot]'
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          MAC_CERTIFICATE_BASE64: ${{ secrets.MAC_CERTIFICATE_BASE64 }}
          MAC_CERTIFICATE_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
        run: |
          echo "create variables"
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo "import certificate"
          echo -n "$MAC_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH

          echo "create temporary keychain"
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          echo "import certificate to keychain"
          security import $CERTIFICATE_PATH -P "$MAC_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
      - name: Run security find-identity -v
        if: runner.os == 'macOS' && github.actor != 'dependabot[bot]'
        run: security find-identity -v
      - name: Build Electron App
        id: build
        run: |
          yarn generate:icons
          yarn generate:logos
          yarn build -- --publish=${{ inputs.publish-release && 'always' || 'never' }}
        continue-on-error: ${{ runner.os == 'macOS' }}
        env:
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GITHUB_TOKEN: ${{ github.token }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          TEST_VERSION: ${{ secrets.TEST_VERSION }}

      - name: Retry build without notarization (macOS agreement expired)
        if: runner.os == 'macOS' && steps.build.outcome == 'failure'
        run: |
          echo "::warning::macOS notarization failed — likely an expired agreement. Producing unsigned build."
          yarn build -- --publish=${{ inputs.publish-release && 'always' || 'never' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          TEST_VERSION: ${{ secrets.TEST_VERSION }}
      - name: Clean up keychain and provisioning profile
        if: always() && runner.os == 'macOS' && github.actor != 'dependabot[bot]'
        run: |
          rm -f $RUNNER_TEMP/build_certificate.p12
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db
      - name: Upload artifacts
        if: ${{ !inputs.publish-release }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: M³ test build for ${{ matrix.os == 'macos-latest' && 'macOS' || matrix.os == 'windows-latest' && 'Windows' || 'Linux' }}
          path: |
            dist/electron/Packaged/*.exe
            dist/electron/Packaged/*.dmg
            dist/electron/Packaged/*.zip
            dist/electron/Packaged/*.AppImage
            dist/electron/Packaged/*/*/Contents/Info.plist
