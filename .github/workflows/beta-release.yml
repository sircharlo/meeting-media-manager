name: Release Beta Version

on:
  workflow_dispatch:
  schedule:
    - cron: '7 6 * * *'

jobs:
  get-commit:
    name: Get release-worthy commits
    runs-on: ubuntu-latest
    if: github.repository == 'sircharlo/meeting-media-manager'
    permissions:
      contents: read
    outputs:
      base_ref: ${{ steps.base.outputs.base_ref }}
      has_commits: ${{ steps.release_commits.outputs.has_commits }}
      messages: ${{ steps.release_commits.outputs.messages }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          persist-credentials: false
      - id: base
        name: Find previous release boundary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          base_ref=$(
            gh release list --limit 100 --exclude-drafts --json tagName,isPrerelease,createdAt \
              --jq '[.[] | select((.isPrerelease == false) or (.tagName | test("-beta\\.")))] | sort_by(.createdAt) | reverse | .[0].tagName // ""'
          )

          if [ -z "$base_ref" ]; then
            base_ref=$(git rev-list --max-parents=0 HEAD)
          fi

          echo "Using $base_ref as the previous release boundary."
          echo "base_ref=$base_ref" >> "$GITHUB_OUTPUT"
      - id: release_commits
        name: Find release-worthy commit messages
        run: python scripts/release-commits.py --base-ref "${{ steps.base.outputs.base_ref }}" --github-output "$GITHUB_OUTPUT"

  bump-version:
    name: Bump version
    needs: get-commit
    if: ${{ needs.get-commit.outputs.has_commits == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      newTag: ${{ steps.version-bump.outputs.newTag }}
      bumpBranch: ${{ steps.bump-branch.outputs.name }}
    steps:
      - id: bump-branch
        name: Set bump branch name
        run: echo "name=beta-bump-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_OUTPUT"
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: Create local bump branch
        run: |
          git checkout -B "${{ steps.bump-branch.outputs.name }}"
      - name: Automated Version Bump
        id: version-bump
        uses: phips28/gh-action-bump-version@215e27a882516826c59df7f09da8c67d5f375cbd # v11.1.5
        with:
          version-type: prerelease
          preid: 'beta'
          tag-prefix: 'v'
          skip-tag: 'true'
          bump-policy: 'last-commit'
          target-branch: ${{ steps.bump-branch.outputs.name }}
          commit-message: 'chore: bump version to {{version}} [skip ci]'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Output new version
        env:
          NEW_VERSION: ${{ steps.version-bump.outputs.newTag }}
        run: echo "new version $NEW_VERSION"

  merge-version-bump:
    name: Merge version bump branch
    needs: bump-version
    uses: ./.github/workflows/pr-creator-and-waiter.yml
    with:
      head: ${{ needs.bump-version.outputs.bumpBranch }}
      title: 'chore: bump version to ${{ needs.bump-version.outputs.newTag }}'
      body: 'Automated beta version bump for ${{ needs.bump-version.outputs.newTag }}.'
      admin: true
    secrets: inherit

  draft-release:
    name: Draft release
    runs-on: ubuntu-latest
    needs: [get-commit, bump-version, merge-version-bump]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: master
          fetch-depth: 0
      - name: Generate release notes
        run: |
          python scripts/release-commits.py \
            --base-ref "${{ needs.get-commit.outputs.base_ref }}" \
            --version "${{ needs.bump-version.outputs.newTag }}" \
            --notes-file release-notes.md
      - name: Create draft release
        id: create_release
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0
        with:
          name: ${{ needs.bump-version.outputs.newTag }}
          tag: ${{ needs.bump-version.outputs.newTag }}
          commit: 'master'
          draft: true
          prerelease: true
          bodyFile: release-notes.md
    outputs:
      id: ${{ steps.create_release.outputs.id }}

  build:
    needs: draft-release
    uses: ./.github/workflows/build.yml
    with:
      checkout-latest: true
      publish-release: true
    secrets:
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      MAC_CERTIFICATE_BASE64: ${{ secrets.MAC_CERTIFICATE_BASE64 }}
      MAC_CERTIFICATE_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      TEST_VERSION: 'false'

  rerun-on-failure:
    needs: [build]
    if: failure() && fromJSON(github.run_attempt) < 2
    runs-on: ubuntu-latest
    steps:
      - env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
          GH_DEBUG: api
        run: gh workflow run rerun.yml -F run_id=${{ github.run_id }}

  publish-release:
    name: 'Publish release'
    runs-on: ubuntu-latest
    needs: [bump-version, build]
    permissions:
      contents: write
    steps:
      - uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0
        with:
          name: ${{ needs.bump-version.outputs.newTag }}
          tag: ${{ needs.bump-version.outputs.newTag }}
          draft: false
          prerelease: true
          allowUpdates: true
          omitBodyDuringUpdate: true
          updateOnlyUnreleased: true
          token: ${{ secrets.GITHUB_TOKEN }}

  cleanup:
    runs-on: ubuntu-latest
    needs: [publish-release]
    permissions:
      contents: write
    steps:
      - name: Cleanup beta releases (calendar-day dedupe)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          KEEP_DAYS: 2 # number of calendar days to keep (incl today)
        run: |
          set -e

          echo "Fetching beta prereleases..."
          mapfile -t BETAS < <(
            gh release list --limit 200 --json tagName,isPrerelease,createdAt \
            --jq '.[]
              | select(.isPrerelease == true and (.tagName | test("beta")))
              | "\(.createdAt) \(.tagName)"' \
            | sort -r
          )
          if [ "${#BETAS[@]}" -eq 0 ]; then
            echo "No beta releases found"
            exit 0
          fi
          # Step 1: Delete all prerelease releases with no artifacts
          echo "Checking for prereleases with no artifacts..."
          for entry in "${BETAS[@]}"; do
            TAG=$(awk '{print $2}' <<< "$entry")
            # Get asset count for this release
            ASSET_COUNT=$(gh release view "$TAG" --json assets --jq '.assets | length' 2>/dev/null || echo "0")
            if [ "$ASSET_COUNT" -eq 0 ]; then
              echo "Deleting prerelease with no artifacts: $TAG"
              gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || echo "⚠ Release $TAG already deleted, skipping..."
            fi
          done
          # Refresh the list after deletions
          echo "Refreshing beta prerelease list..."
          mapfile -t BETAS < <(
            gh release list --limit 200 --json tagName,isPrerelease,createdAt \
            --jq '.[]
              | select(.isPrerelease == true and (.tagName | test("beta")))
              | "\(.createdAt) \(.tagName)"' \
            | sort -r
          )
          if [ "${#BETAS[@]}" -eq 0 ]; then
            echo "No beta releases remaining after artifact cleanup"
            exit 0
          fi
          # Step 2: Calendar-day deduplication logic
          declare -A DAY_TO_KEEP_TAG
          # Map each calendar day → latest beta for that day
          for entry in "${BETAS[@]}"; do
            CREATED_AT=$(awk '{print $1}' <<< "$entry")
            TAG=$(awk '{print $2}' <<< "$entry")
            DAY=$(date -u -d "$CREATED_AT" +"%Y-%m-%d")
            if [[ -z "${DAY_TO_KEEP_TAG[$DAY]}" ]]; then
              DAY_TO_KEEP_TAG["$DAY"]="$TAG"
            fi
          done
          echo "Latest beta per day:"
          for DAY in "${!DAY_TO_KEEP_TAG[@]}"; do
            echo "  $DAY → ${DAY_TO_KEEP_TAG[$DAY]}"
          done
          # Determine which days to keep (most recent calendar days)
          mapfile -t DAYS_TO_KEEP < <(
            printf '%s\n' "${!DAY_TO_KEEP_TAG[@]}" | sort -r | head -n "$KEEP_DAYS"
          )
          declare -A KEEP_TAGS
          for DAY in "${DAYS_TO_KEEP[@]}"; do
            KEEP_TAGS["${DAY_TO_KEEP_TAG[$DAY]}"]=1
          done
          echo "Keeping beta tags:"
          for tag in "${!KEEP_TAGS[@]}"; do
            echo "  ✔ $tag"
          done
          # Delete everything else
          for entry in "${BETAS[@]}"; do
            TAG=$(awk '{print $2}' <<< "$entry")
            if [[ -z "${KEEP_TAGS[$TAG]}" ]]; then
              echo "Deleting beta: $TAG"
              gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || echo "⚠ Release/tag $TAG already deleted, skipping..."
            fi
          done
          echo "Beta cleanup complete ✅"
