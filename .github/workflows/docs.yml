name: Deploy Docs site to Pages

on:
  release:
    types: [released]
  push:
    branches:
      - master
    paths:
      - docs/**
      - src/constants/locales.ts
      - package.json
      - yarn.lock
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  quality:
    name: Lint and test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out Git repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'yarn'
      - name: Install dependencies
        run: yarn install
      - name: Prepare Quasar
        run: yarn quasar prepare
      - name: Lint files
        run: yarn docs:lint
      - name: Run tests
        run: yarn docs:test

  build:
    runs-on: ubuntu-latest
    needs: [quality]
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'yarn'
      - uses: actions/configure-pages@v6
      - run: yarn install
      - run: yarn quasar prepare
      - run: |
          yarn generate:logos
          yarn docs:build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: docs/.vitepress/dist
      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
